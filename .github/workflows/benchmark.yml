name: Benchmark
on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'Makefile'
      - '.github/workflows/benchmark.yml'
  # REMOVE THIS BEFORE MERGE
  pull_request:
  workflow_dispatch:
    inputs:
      full:
        description: "Run benchmarks for every module, ignoring the affected-module diff."
        type: boolean
        default: false

# Declare default permissions as read only.
permissions: read-all

env:
  DEFAULT_GO_VERSION: "~1.26.0"
jobs:
  # Related issue: https://github.com/CodSpeedHQ/codspeed-go/issues/51
  sharding-benchmark:
    name: Sharding benchmarks
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.sharding.outputs.shards }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need history so the affected-module detector can diff
          # against the prior commit.
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.DEFAULT_GO_VERSION }}
          check-latest: true
          cache-dependency-path: "**/go.sum"
      - id: sharding
        env:
          # `before` is the previous commit on main for push events;
          # empty (and unused) for workflow_dispatch, where the Makefile
          # default base ref applies.
          BASE_REF: ${{ github.event.before }}
          ARGS: ${{ inputs.full && '-all' || '' }}
        run: |
          echo "shards=$(make print-affected-benchmarks)" >> $GITHUB_OUTPUT

  benchmark:
    needs: sharding-benchmark
    # Skip the matrix entirely when nothing benchmark-relevant changed.
    if: needs.sharding-benchmark.outputs.shards != '[]'
    permissions:
      contents: write # required for pushing to gh-pages branch
    name: Benchmarks
    runs-on: oracle-bare-metal-64cpu-1024gb-x86-64-ubuntu-24
    strategy:
      matrix:
        shard: ${{ fromJson(needs.sharding-benchmark.outputs.shards) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Bare metal uses Ubuntu 24.04, which does not have `make` and `build-essential`.
      - name: Install make and build-essential
        run: sudo apt-get update && sudo apt-get install -y make build-essential
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.DEFAULT_GO_VERSION }}
          check-latest: true
          # Disable setup-go's GOMODCACHE/GOCACHE caching on the bare-metal
          # runner. The runner is persistent, so ~/go/pkg/mod and
          # ~/.cache/go-build already survive between jobs locally. The
          # Actions cache for this key reaches multiple GB across the matrix,
          # which makes every shard pay ~1-2 min on either the restore
          # (download + tar -xf) or the post-step save (tar + upload), with
          # no benefit over the on-disk caches.
          cache: false
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd # v4.15.1
        with:
          mode: walltime
          allow-empty: true
          # CodSpeed runs extremely slow when there are 128 processes involved, which is the number
          # of CPUs on the bare metal machine. Limiting the number of processes to 4 helps mitigate this. 4 also matches the number of CPUs on GitHub runners.
          #
          # CodSpeed overrides the default benchtime if we don't explicitly specify it.
          # Having this would avoid running benchmark for more than 1 hour.
          run: GOMAXPROCS=4 make benchmark/${{matrix.shard}}
